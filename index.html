<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HomeLog — IoT Event Logger</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080a0f; --surface:#0e1118; --surface2:#13171f; --surface3:#1a1f2b;
  --border:#1e2433; --border2:#252c3d;
  --accent:#00e5ff; --accent-dim:rgba(0,229,255,0.08); --accent-border:rgba(0,229,255,0.18);
  --green:#00ff88; --green-dim:rgba(0,255,136,0.08);
  --orange:#ff7b3a; --orange-dim:rgba(255,123,58,0.08);
  --red:#ff4466; --red-dim:rgba(255,68,102,0.08);
  --yellow:#ffd166; --yellow-dim:rgba(255,209,102,0.08);
  --text:#dde3f0; --text2:#8892a4; --text3:#4a5366;
  --mono:'IBM Plex Mono',monospace; --sans:'Syne',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(30,36,51,0.45) 1px,transparent 1px),linear-gradient(90deg,rgba(30,36,51,0.45) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:999;}
.app{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 22px 80px;}

/* HEADER */
header{padding:28px 0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);margin-bottom:26px;animation:fadeDown .6s ease;}
.brand{display:flex;align-items:center;gap:14px;}
.brand-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--accent),#0066ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 20px rgba(0,229,255,.3);}
.brand-name{font-size:1.5rem;font-weight:800;letter-spacing:-1px;}
.brand-name em{color:var(--accent);font-style:normal;}
.brand-sub{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.header-right{display:flex;align-items:center;gap:14px;}
.live-pill{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:.7rem;color:var(--green);background:var(--green-dim);border:1px solid rgba(0,255,136,.2);padding:6px 14px;border-radius:20px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
.clock{font-family:var(--mono);font-size:.8rem;color:var(--text2);}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;animation:fadeUp .5s ease .1s both;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:default;}
.stat:hover{border-color:var(--border2);transform:translateY(-2px);}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--stat-color,var(--accent));}
.stat-label{font-family:var(--mono);font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;}
.stat-value{font-size:2rem;font-weight:800;color:var(--stat-color,var(--accent));line-height:1;}
.stat-desc{font-size:.72rem;color:var(--text2);margin-top:4px;}
.stat-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:2rem;opacity:.1;}

/* LAYOUT */
.main-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;animation:fadeUp .5s ease .2s both;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface2);}
.panel-title{font-size:.85rem;font-weight:700;letter-spacing:.5px;}
.panel-count{font-family:var(--mono);font-size:.7rem;color:var(--text3);}

/* FILTERS */
.filter-bar{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface2);flex-wrap:wrap;}
.filter-btn{font-family:var(--mono);font-size:.68rem;background:transparent;border:1px solid var(--border2);color:var(--text2);padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;letter-spacing:.5px;}
.filter-btn:hover{border-color:var(--accent);color:var(--accent);}
.filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}
.search-box{margin-left:auto;background:var(--surface3);border:1px solid var(--border2);border-radius:6px;padding:5px 12px;font-family:var(--mono);font-size:.68rem;color:var(--text);outline:none;width:160px;transition:border-color .2s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--text3);}

/* EVENT LIST */
.event-list{max-height:520px;overflow-y:auto;}
.event-list::-webkit-scrollbar{width:4px;}
.event-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.event-item{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:13px 20px;border-bottom:1px solid var(--border);transition:background .15s;animation:slideIn .3s ease;}
.event-item:hover{background:var(--surface2);}
.event-item:last-child{border-bottom:none;}
.event-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.event-body{min-width:0;}
.event-name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-meta{font-family:var(--mono);font-size:.65rem;color:var(--text2);margin-top:3px;}
.event-right{text-align:right;flex-shrink:0;}
.event-time{font-family:var(--mono);font-size:.65rem;color:var(--text3);}
.event-badge{display:inline-block;margin-top:4px;font-family:var(--mono);font-size:.58rem;letter-spacing:.5px;padding:2px 8px;border-radius:4px;text-transform:uppercase;}

/* SEVERITY */
.sev-info    {--c:var(--accent); background:var(--accent-dim); color:var(--accent);}
.sev-ok      {--c:var(--green);  background:var(--green-dim);  color:var(--green);}
.sev-warn    {--c:var(--yellow); background:var(--yellow-dim); color:var(--yellow);}
.sev-alert   {--c:var(--orange); background:var(--orange-dim); color:var(--orange);}
.sev-critical{--c:var(--red);    background:var(--red-dim);    color:var(--red);}
.event-icon.sev-info    {background:var(--accent-dim); border:1px solid rgba(0,229,255,.15);}
.event-icon.sev-ok      {background:var(--green-dim);  border:1px solid rgba(0,255,136,.15);}
.event-icon.sev-warn    {background:var(--yellow-dim); border:1px solid rgba(255,209,102,.15);}
.event-icon.sev-alert   {background:var(--orange-dim); border:1px solid rgba(255,123,58,.15);}
.event-icon.sev-critical{background:var(--red-dim);    border:1px solid rgba(255,68,102,.15);}

/* SIDE */
.side{display:flex;flex-direction:column;gap:16px;}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.form-body{padding:16px;display:flex;flex-direction:column;gap:10px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
label{font-family:var(--mono);font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;}
select,input[type=text]{width:100%;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;padding:9px 12px;font-family:var(--mono);font-size:.72rem;color:var(--text);outline:none;transition:border-color .2s;appearance:none;}
select:focus,input[type=text]:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.btn-log{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#0077ff);border:none;border-radius:8px;font-family:var(--sans);font-size:.85rem;font-weight:700;color:#000;cursor:pointer;transition:opacity .2s,transform .15s;letter-spacing:.5px;}
.btn-log:hover{opacity:.9;transform:translateY(-1px);}
.btn-sim{width:100%;padding:10px;background:transparent;border:1px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:.78rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;}
.btn-sim:hover{border-color:var(--green);color:var(--green);background:var(--green-dim);}
.btn-sim.active{border-color:var(--red);color:var(--red);background:var(--red-dim);}

/* DEVICES */
.device-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--border);transition:background .15s;}
.device-item:last-child{border-bottom:none;}
.device-item:hover{background:var(--surface2);}
.device-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
.d-on{background:var(--green);color:var(--green);}
.d-off{background:var(--text3);color:var(--text3);box-shadow:none;}
.d-warn{background:var(--yellow);color:var(--yellow);}
.device-info{flex:1;min-width:0;}
.device-name{font-size:.8rem;font-weight:600;}
.device-room{font-family:var(--mono);font-size:.62rem;color:var(--text3);margin-top:2px;}
.device-status-text{font-family:var(--mono);font-size:.65rem;}

/* CHART */
.mini-chart{padding:16px 20px;}
.chart-bars{display:flex;align-items:flex-end;gap:5px;height:60px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
.bar{width:100%;border-radius:4px 4px 0 0;background:linear-gradient(to top,var(--accent),rgba(0,229,255,.3));transition:height .4s ease;min-height:3px;}
.bar-label{font-family:var(--mono);font-size:.55rem;color:var(--text3);}
.btn-export{margin:0 16px 16px;width:calc(100% - 32px);padding:9px;background:transparent;border:1px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:.75rem;font-weight:600;color:var(--text2);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;}
.btn-export:hover{border-color:var(--yellow);color:var(--yellow);background:var(--yellow-dim);}

/* EMPTY */
.empty{padding:50px 20px;text-align:center;}
.empty-icon{font-size:2.5rem;margin-bottom:12px;opacity:.25;}
.empty-text{font-family:var(--mono);font-size:.75rem;color:var(--text3);}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes fadeUp  {from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none}}
@keyframes slideIn {from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:none}}
@keyframes pulse   {0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
@keyframes flash   {0%,100%{background:var(--surface)}50%{background:var(--accent-dim)}}
.event-item.new{animation:slideIn .3s ease,flash .6s ease;}

@media(max-width:800px){.stats-grid{grid-template-columns:repeat(2,1fr)}.main-grid{grid-template-columns:1fr}}
@media(max-width:480px){.header-right .clock{display:none}}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="brand">
    <div class="brand-icon">🏠</div>
    <div>
      <div class="brand-name">Home<em>Log</em></div>
      <div class="brand-sub">IoT Event Logger v1.0</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-pill"><div class="dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:--</div>
  </div>
</header>

<div class="stats-grid">
  <div class="stat" style="--stat-color:var(--accent)">
    <div class="stat-label">Total Events</div>
    <div class="stat-value" id="stat-total">0</div>
    <div class="stat-desc">All time logged</div>
    <div class="stat-icon">📋</div>
  </div>
  <div class="stat" style="--stat-color:var(--green)">
    <div class="stat-label">Online Devices</div>
    <div class="stat-value" id="stat-online">7</div>
    <div class="stat-desc">of 9 connected</div>
    <div class="stat-icon">📡</div>
  </div>
  <div class="stat" style="--stat-color:var(--yellow)">
    <div class="stat-label">Warnings</div>
    <div class="stat-value" id="stat-warn">0</div>
    <div class="stat-desc">Need attention</div>
    <div class="stat-icon">⚠️</div>
  </div>
  <div class="stat" style="--stat-color:var(--red)">
    <div class="stat-label">Critical</div>
    <div class="stat-value" id="stat-crit">0</div>
    <div class="stat-desc">Urgent alerts</div>
    <div class="stat-icon">🚨</div>
  </div>
</div>

<div class="main-grid">
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">⚡ Event Log</span>
      <span class="panel-count" id="event-count">0 events</span>
    </div>
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="sev-info">Info</button>
      <button class="filter-btn" data-filter="sev-ok">OK</button>
      <button class="filter-btn" data-filter="sev-warn">Warn</button>
      <button class="filter-btn" data-filter="sev-alert">Alert</button>
      <button class="filter-btn" data-filter="sev-critical">Critical</button>
      <input class="search-box" type="text" placeholder="Search events…" id="search">
    </div>
    <div class="event-list" id="event-list">
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-text">No events yet — log one or hit Simulate!</div>
      </div>
    </div>
  </div>

  <div class="side">
    <div class="add-form">
      <div class="panel-header"><span class="panel-title">➕ Log Event</span></div>
      <div class="form-body">
        <div>
          <label>Device</label>
          <select id="f-device">
            <option>Motion Sensor — Hallway</option>
            <option>Door Lock — Front Door</option>
            <option>Smart Thermostat — Living Room</option>
            <option>Security Camera — Garden</option>
            <option>Smoke Detector — Kitchen</option>
            <option>Smart Bulb — Living Room</option>
            <option>Window Sensor — Bedroom</option>
            <option>Water Leak Sensor — Bathroom</option>
            <option>Smart Plug — Office</option>
          </select>
        </div>
        <div class="form-row">
          <div>
            <label>Event Type</label>
            <select id="f-type">
              <option>Motion Detected</option>
              <option>Door Opened</option>
              <option>Door Locked</option>
              <option>Temperature Change</option>
              <option>Smoke Detected</option>
              <option>Light On</option>
              <option>Light Off</option>
              <option>Water Leak</option>
              <option>Device Online</option>
              <option>Device Offline</option>
              <option>Low Battery</option>
              <option>Custom</option>
            </select>
          </div>
          <div>
            <label>Severity</label>
            <select id="f-severity">
              <option value="sev-info">Info</option>
              <option value="sev-ok">OK</option>
              <option value="sev-warn">Warning</option>
              <option value="sev-alert">Alert</option>
              <option value="sev-critical">Critical</option>
            </select>
          </div>
        </div>
        <div>
          <label>Note (optional)</label>
          <input type="text" id="f-note" placeholder="e.g. unusual time of day…">
        </div>
        <button class="btn-log" onclick="logManual()">LOG EVENT</button>
        <button class="btn-sim" id="sim-btn" onclick="toggleSim()">▶ Simulate Random Events</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📡 Device Status</span>
        <span class="panel-count">9 registered</span>
      </div>
      <div id="device-list"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">📊 Activity (last 7 days)</span>
      </div>
      <div class="mini-chart">
        <div class="chart-bars" id="chart-bars"></div>
      </div>
      <button class="btn-export" onclick="exportCSV()">⬇ Export as CSV</button>
    </div>
  </div>
</div>
</div>

<script>
const DEVICES = [
  {name:'Motion Sensor',     room:'Hallway',    status:'on'},
  {name:'Door Lock',         room:'Front Door', status:'on'},
  {name:'Smart Thermostat',  room:'Living Room',status:'on'},
  {name:'Security Camera',   room:'Garden',     status:'warn'},
  {name:'Smoke Detector',    room:'Kitchen',    status:'on'},
  {name:'Smart Bulb',        room:'Living Room',status:'on'},
  {name:'Window Sensor',     room:'Bedroom',    status:'off'},
  {name:'Water Leak Sensor', room:'Bathroom',   status:'on'},
  {name:'Smart Plug',        room:'Office',     status:'off'},
];

const ICONS = {
  'Motion Detected':'🚶','Door Opened':'🚪','Door Locked':'🔒',
  'Temperature Change':'🌡️','Smoke Detected':'🔥','Light On':'💡',
  'Light Off':'🌑','Water Leak':'💧','Device Online':'✅',
  'Device Offline':'❌','Low Battery':'🔋','Custom':'📌',
};

const SIM_POOL = [
  {device:'Motion Sensor — Hallway',        type:'Motion Detected',   sev:'sev-info',     note:'Person detected at door'},
  {device:'Door Lock — Front Door',         type:'Door Opened',       sev:'sev-ok',       note:'Unlocked via app'},
  {device:'Smart Thermostat — Living Room', type:'Temperature Change', sev:'sev-info',     note:'22°C → 24°C'},
  {device:'Security Camera — Garden',       type:'Motion Detected',   sev:'sev-alert',    note:'Unrecognised movement'},
  {device:'Smoke Detector — Kitchen',       type:'Smoke Detected',    sev:'sev-critical', note:'Smoke threshold exceeded!'},
  {device:'Smart Bulb — Living Room',       type:'Light On',          sev:'sev-ok',       note:'Scheduled routine'},
  {device:'Window Sensor — Bedroom',        type:'Door Opened',       sev:'sev-warn',     note:'Opened at unusual time'},
  {device:'Water Leak Sensor — Bathroom',   type:'Water Leak',        sev:'sev-critical', note:'Leak detected under sink'},
  {device:'Smart Plug — Office',            type:'Device Online',     sev:'sev-ok',       note:'Reconnected after outage'},
  {device:'Door Lock — Front Door',         type:'Low Battery',       sev:'sev-warn',     note:'15% battery remaining'},
  {device:'Smart Thermostat — Living Room', type:'Device Offline',    sev:'sev-alert',    note:'Connection lost'},
  {device:'Smart Bulb — Living Room',       type:'Light Off',         sev:'sev-info',     note:'Manual switch off'},
];

let events = [];
let activeFilter = 'all';
let searchQuery  = '';
let simInterval  = null;
let simFired     = 0;
const dailyCounts = [2,5,3,8,4,6,0];

function init() {
  renderDevices();
  renderChart();
  updateClock();
  setInterval(updateClock, 1000);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderList();
    });
  });
  document.getElementById('search').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    renderList();
  });
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString();
}

function renderDevices() {
  document.getElementById('device-list').innerHTML = DEVICES.map(d => {
    const cls = d.status==='on'?'d-on':d.status==='warn'?'d-warn':'d-off';
    const col = d.status==='on'?'var(--green)':d.status==='warn'?'var(--yellow)':'var(--text3)';
    return `<div class="device-item">
      <div class="device-dot ${cls}"></div>
      <div class="device-info">
        <div class="device-name">${d.name}</div>
        <div class="device-room">${d.room}</div>
      </div>
      <div class="device-status-text" style="color:${col}">${d.status==='on'?'online':d.status==='warn'?'warning':'offline'}</div>
    </div>`;
  }).join('');
}

function renderChart() {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const today = (new Date().getDay() + 6) % 7;
  const max = Math.max(...dailyCounts, 1);
  document.getElementById('chart-bars').innerHTML = dailyCounts.map((c,i) => {
    const pct = Math.max((c/max)*100, 4);
    const label = days[(today - 6 + i + 7) % 7];
    return `<div class="bar-wrap"><div class="bar" style="height:${pct}%"></div><div class="bar-label">${label}</div></div>`;
  }).join('');
}

function addEvent(device, type, sev, note) {
  const now = new Date();
  const ev = {id:Date.now()+Math.random(), device, type, sev, note:note||'',
    time:now.toLocaleTimeString(), date:now.toLocaleDateString(), isNew:true};
  events.unshift(ev);
  dailyCounts[6]++;
  updateStats();
  renderList();
  renderChart();
  setTimeout(() => { ev.isNew = false; }, 700);
}

function logManual() {
  addEvent(
    document.getElementById('f-device').value,
    document.getElementById('f-type').value,
    document.getElementById('f-severity').value,
    document.getElementById('f-note').value.trim()
  );
  document.getElementById('f-note').value = '';
}

function toggleSim() {
  const btn = document.getElementById('sim-btn');
  if (simInterval) {
    clearInterval(simInterval); simInterval = null; simFired = 0;
    btn.textContent = '▶ Simulate Random Events';
    btn.classList.remove('active');
    return;
  }
  btn.textContent = '⏹ Stop Simulation';
  btn.classList.add('active');
  const fire = () => {
    const e = SIM_POOL[Math.floor(Math.random() * SIM_POOL.length)];
    addEvent(e.device, e.type, e.sev, e.note);
    simFired++;
    if (simFired >= 12) {
      clearInterval(simInterval); simInterval = null; simFired = 0;
      btn.textContent = '▶ Simulate Random Events';
      btn.classList.remove('active');
    }
  };
  fire();
  simInterval = setInterval(fire, 850);
}

function updateStats() {
  document.getElementById('stat-total').textContent = events.length;
  document.getElementById('stat-warn').textContent  = events.filter(e=>e.sev==='sev-warn').length;
  document.getElementById('stat-crit').textContent  = events.filter(e=>e.sev==='sev-critical').length;
}

function renderList() {
  const el = document.getElementById('event-list');
  let filtered = events.filter(e => {
    if (activeFilter !== 'all' && e.sev !== activeFilter) return false;
    if (searchQuery && !(e.device+e.type+e.note).toLowerCase().includes(searchQuery)) return false;
    return true;
  });
  document.getElementById('event-count').textContent = `${filtered.length} event${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No matching events found</div></div>`;
    return;
  }
  el.innerHTML = filtered.map(e => {
    const icon = ICONS[e.type] || '📌';
    const label = e.sev.replace('sev-','').toUpperCase();
    return `<div class="event-item ${e.isNew?'new':''}">
      <div class="event-icon ${e.sev}">${icon}</div>
      <div class="event-body">
        <div class="event-name">${e.type}</div>
        <div class="event-meta">${e.device}${e.note?' · '+e.note:''}</div>
      </div>
      <div class="event-right">
        <div class="event-time">${e.time}</div>
        <div class="event-badge ${e.sev}">${label}</div>
      </div>
    </div>`;
  }).join('');
}

function exportCSV() {
  if (!events.length) { alert('No events to export!'); return; }
  const rows = events.map(e =>
    `"${e.date}","${e.time}","${e.device}","${e.type}","${e.sev.replace('sev-','')}","${e.note}"`
  );
  const csv = 'Date,Time,Device,Event Type,Severity,Note\n' + rows.join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `homelog-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
}

init();
</script>
